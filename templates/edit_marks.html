{% extends "admin_base.html" %}

{% block content %}

<div class="container-fluid">

<!-- BACK BUTTON -->

<div class="mb-3">
<a href="/student_records" class="btn btn-primary w-100 w-md-auto">
⬅ Back
</a>
</div>

<h2 class="mb-4 text-center text-md-start">Edit Student Marks</h2>

<style>

table input{
width:100%;
min-width:80px;
text-align:center;
}

.table-responsive{
overflow-x:auto;
}

.student-col{
min-width:150px;
}

.math-col{
min-width:100px;
}

/* Mobile buttons */

@media(max-width:768px){

.form-buttons{
display:flex;
flex-direction:column;
gap:10px;
}

}

</style>

<form method="POST">

<div class="table-responsive">

<table class="table table-bordered table-striped text-center align-middle">

<thead class="table-dark">

<tr>
<th class="student-col">Student ID</th>
<th class="math-col">Maths</th>
<th>Physics</th>
<th>Chemistry</th>
<th>Biology</th>
</tr>

</thead>

<tbody>

<tr>

<td>

<input type="text"
class="form-control"
value="{{data.student_id}}"
readonly>

</td>

<td>

<input type="number"
name="maths"
class="form-control"
value="{{data.maths}}">

</td>

<td>

<input type="number"
name="physics"
class="form-control"
value="{{data.physics}}">

</td>

<td>

<input type="number"
name="chemistry"
class="form-control"
value="{{data.chemistry}}">

</td>

<td>

<input type="number"
name="biology"
class="form-control"
value="{{data.biology}}">

</td>

</tr>

</tbody>

</table>

</div>


<!-- BUTTONS OUTSIDE TABLE -->

<div class="mt-4 text-center form-buttons">

<button class="btn btn-success px-4">
Update Marks
</button>

<a href="/student_records" class="btn btn-secondary px-4 ms-md-2">
Cancel
</a>

</div>

</form>

</div>

{% endblock %}
