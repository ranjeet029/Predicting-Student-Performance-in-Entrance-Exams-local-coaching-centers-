<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Apex Institute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f6f9;
}

/* NAVBAR */

.navbar{
background:#1f2d3d;
padding:10px 0;
}

.navbar-brand{
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
color:white !important;
}

/* LOGO */

.logo-img{
height:40px;
width:auto;
margin-right:10px;
}

/* MOBILE LOGO */

@media(max-width:768px){
.logo-img{
height:45px;
}
}

.nav-link{
color:white !important;
font-weight:500;
margin-left:10px;
}

.nav-link:hover{
color:#ffd700 !important;
}

/* FOOTER */

footer{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
margin-top:50px;
font-size:14px;
}

</style>

</head>

<body>


<!-- NAVBAR (CONDITIONAL) -->

{% if request.path not in ['/student_dashboard','/profile','/leaderboard'] %}

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">
<img src="{{ url_for('static', filename='logo.png') }}" class="logo-img">
Apex Institute
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/login">Login</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/signup">Register</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/admin_login">Admin</a>
</li>

</ul>

</div>

</div>

</nav>

{% endif %}


<!-- PAGE CONTENT -->

{% block content %}
{% endblock %}


<!-- FOOTER -->

<footer>
<p>© 2026 Apex Institute | Student Performance Prediction System</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
