<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Apex Institute Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f6f9;
margin:0;
}

/* NAVBAR */

.navbar{
background:linear-gradient(135deg,#1f2d3d,#34495e);
padding:10px 0;
}

.navbar-brand{
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
color:white !important;
}

.logo-img{
height:40px;
margin-right:10px;
}

/* LAYOUT */

.admin-layout{
display:flex;
min-height:calc(100vh - 60px);
}

/* SIDEBAR */

.sidebar{
width:230px;
background:white;
border-right:1px solid #ddd;
padding-top:20px;
transition:0.3s;
}

.sidebar a{
display:block;
padding:12px 20px;
text-decoration:none;
color:#333;
font-weight:500;
transition:0.3s;
}

.sidebar a:hover{
background:#f1f7fa;
color:#0d6efd;
}

.sidebar a.active{
background:#e8f4fa;
border-left:4px solid #0d6efd;
color:#0d6efd;
}

/* MAIN CONTENT */

.main-content{
flex:1;
padding:30px;
}

/* FOOTER */

footer{
background:#1f2d3d;
color:white;
text-align:center;
padding:12px;
}

/* MOBILE */

.menu-toggle{
display:none;
}

@media(max-width:768px){

.admin-layout{
flex-direction:column;
}

.sidebar{
position:fixed;
left:-230px;
top:60px;
height:100%;
z-index:1000;
}

.sidebar.active{
left:0;
}

.menu-toggle{
display:inline-block;
}

}

</style>

</head>

<body>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<div class="d-flex align-items-center">

<button class="btn btn-light me-2 menu-toggle" onclick="toggleSidebar()">
☰
</button>

<a class="navbar-brand" href="/admin_panel">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo-img">

Apex Institute 

</a>

</div>

<div class="ms-auto">

<a href="/admin_panel" class="btn btn-outline-light btn-sm me-2">
Admin Panel
</a>

<a href="/admin_logout" class="btn btn-danger btn-sm">
Logout
</a>

</div>

</div>

</nav>


<!-- MAIN LAYOUT -->

<div class="admin-layout">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<a href="/admin_panel">🏠 Dashboard</a>

<a href="/admin_panel#marks">➕ Add Marks</a>

<a href="/upload_marks_page">📥 Upload Marks</a>

<a href="/student_records">📊 Student Marks Record</a>

<a href="/prediction_page">🤖 Prediction</a>

<a href="/admin_settings">👨‍🎓 Student Details</a>

</div>


<!-- CONTENT -->

<div class="main-content">

{% block content %}
{% endblock %}

</div>

</div>


<!-- FOOTER -->

<footer>

© 2026 Apex Institute | Admin Panel

</footer>


<script>

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("active")

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
