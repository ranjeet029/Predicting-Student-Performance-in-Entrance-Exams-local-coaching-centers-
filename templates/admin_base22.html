<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Apex Institute Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f4f6f9;
margin:0;
}

/* NAVBAR */

.navbar{
background:linear-gradient(135deg,#1f2d3d,#2c3e50);
padding:12px 0;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.navbar-brand{
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
color:white !important;
}

.logo-img{
height:40px;
margin-right:10px;
}

/* LAYOUT */

.admin-layout{
display:flex;
min-height:calc(100vh - 60px);
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#ffffff;
border-right:1px solid #eaeaea;
padding-top:10px;
transition:0.3s;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:12px 20px;
color:#444;
font-weight:500;
text-decoration:none;
border-left:4px solid transparent;
transition:0.3s;
}

/* ICON STYLE (COLORFUL FIXED) */

.sidebar a i{
width:20px;
text-align:center;
font-size:16px;
}

/* Individual colors */

.icon-home{color:#0984e3;}
.icon-add{color:#00b894;}
.icon-upload{color:#fdcb6e;}
.icon-record{color:#6c5ce7;}
.icon-ai{color:#e17055;}
.icon-student{color:#00cec9;}
.icon-course{color:#e84393;}
.icon-slider{color:#2ecc71;}

/* hover */

.sidebar a:hover{
background:#f5faff;
color:#0d6efd;
}

/* keep icon color same on hover */
.sidebar a:hover i{
color:inherit;
}

/* active */

.sidebar a.active{
background:#e8f1ff;
color:#0d6efd;
border-left:4px solid #0d6efd;
}

.sidebar a.active i{
color:inherit;
}

/* SECTION TITLE */

.section-title{
padding:10px 20px;
font-size:12px;
color:#999;
text-transform:uppercase;
letter-spacing:1px;
}

/* MAIN */

.main-content{
flex:1;
padding:30px;
background:#f4f6f9;
min-height:100vh;
}

/* FOOTER */

footer{
background:#1f2d3d;
color:white;
text-align:center;
padding:12px;
}

/* MOBILE */

.menu-toggle{
display:none;
}

@media(max-width:768px){

.admin-layout{
flex-direction:column;
}

.sidebar{
position:fixed;
left:-240px;
top:60px;
height:100%;
z-index:1000;
}

.sidebar.active{
left:0;
}

.menu-toggle{
display:inline-block;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<div class="d-flex align-items-center">

<button class="btn btn-light me-2 menu-toggle" onclick="toggleSidebar()">☰</button>

<a class="navbar-brand" href="/admin_panel">
<img src="{{ url_for('static', filename='logo.png') }}" class="logo-img">
Apex Institute 
</a>

</div>

<div class="ms-auto">

<a href="/admin_panel" class="btn btn-outline-light btn-sm me-2">Admin Panel</a>

<a href="/admin_logout" class="btn btn-danger btn-sm">Logout</a>

</div>

</div>

</nav>


<!-- MAIN -->

<div class="admin-layout">

<div class="sidebar" id="sidebar">

<a href="/admin_panel" class="{% if request.path=='/admin_panel' %}active{% endif %}">
<i class="fa fa-home icon-home"></i> Dashboard
</a>

<a href="/admin_panel#marks">
<i class="fa fa-plus icon-add"></i> Add Marks
</a>

<a href="/upload_marks_page" class="{% if request.path=='/upload_marks_page' %}active{% endif %}">
<i class="fa fa-upload icon-upload"></i> Upload Marks
</a>

<a href="/student_records" class="{% if request.path=='/student_records' %}active{% endif %}">
<i class="fa fa-chart-bar icon-record"></i> Student Records
</a>

<a href="/prediction_page" class="{% if request.path=='/prediction_page' %}active{% endif %}">
<i class="fa fa-robot icon-ai"></i> Prediction
</a>

<div class="section-title">Management</div>

<a href="/admin_settings" class="{% if request.path=='/admin_settings' %}active{% endif %}">
<i class="fa fa-user-graduate icon-student"></i> Students
</a>

<a href="/admin_management" class="{% if request.path=='/admin_management' %}active{% endif %}">
<i class="fa fa-cogs icon-slider"></i> Management
</a>

</div>


<div class="main-content">
{% block content %}
{% endblock %}
</div>

</div>


<footer>
© 2026 Apex Institute | Admin Panel
</footer>


<script>
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active")
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
